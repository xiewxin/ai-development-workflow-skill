name: publication-check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Validate Bash syntax
        run: bash -n scripts/validate-publication.sh tests/test-validate-publication.sh
      - name: Run publication validator tests
        run: bash tests/test-validate-publication.sh
      - name: Run publication validation
        run: bash scripts/validate-publication.sh
      - name: Check whitespace errors
        run: git diff --check

  python-contract:
    name: python-contract (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Show Python version
        run: python --version
      - name: Run Python contract tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
